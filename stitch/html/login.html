<style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes flicker {
            0% { opacity: 0.97; }
            5% { opacity: 0.92; }
            10% { opacity: 0.98; }
            15% { opacity: 0.93; }
            20% { opacity: 0.99; }
            100% { opacity: 1; }
        }
        @keyframes floating-particle {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .scanline-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 240, 255, 0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }

        .scanline-motion {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            animation: scanline 8s linear infinite;

            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 10px rgba(0, 240, 255, 0.05);
            position: relative;
        }

        .corner-bracket {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #00f0ff;
        }

        .bracket-tl { top: -2px; left: -2px; border-top-width: 2px; border-left-width: 2px; }
        .bracket-tr { top: -2px; right: -2px; border-top-width: 2px; border-right-width: 2px; }
        .bracket-bl { bottom: -2px; left: -2px; border-bottom-width: 2px; border-left-width: 2px; }
        .bracket-br { bottom: -2px; right: -2px; border-bottom-width: 2px; border-right-width: 2px; }

        .particle {

            background: #00f0ff;

<script>
        // Floating Particle System
        const container = document.getElementById('particle-container');
        const particleCount = 40;

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 3 + 1;
            const startX = Math.random() * window.innerWidth;
            const startY = window.innerHeight + 10;
            const duration = Math.random() * 10 + 5;
            const delay = Math.random() * 5;

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;
            particle.style.boxShadow = `0 0 ${size * 2}px #00f0ff`;
            
            particle.style.animation = `floating-particle ${duration}s linear ${delay}s infinite`;

            container.appendChild(particle);

            // Remove and recycle particle to keep DOM clean
            setTimeout(() => {
                particle.remove();
                createParticle();
            }, (duration + delay) * 1000);
        }

        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        // Form Submission Simulation
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> AUTHENTICATING...';
            btn.style.opacity = '0.8';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> ACCESS GRANTED';
                btn.classList.add('bg-tertiary-container');
                btn.classList.remove('bg-primary-container');
                btn.style.boxShadow = '0 0 30px rgba(243, 219, 0, 0.6)';
            }, 1500);
        });

        // Mouse skew effect on card for extra dimension
        const card = document.querySelector('.hologram-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            card.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
